<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BulletBox</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Jersey+10&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Jersey 10", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    .title {
      color: #FFD400;
      font-size: 64px;
      text-align: center;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #ffffff;
      font-size: 20px;
      margin-top: 10px;
      text-align: center;
      opacity: 0.9;
    }

    .button {
      margin-top: 25px;
      background: #00d5ff;
      color: #000;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 18px;
      text-decoration: none;
      cursor: default;
      user-select: none;
      transition: transform 0.1s ease;
    }

    .button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="title">BULLETBOX</div>
  <div class="subtitle">The best 2d pvp game you'll ever play</div>
  <div class="button">Releasing May 1st</div>
</body>
</html>
