<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BulletBox</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Jersey+10&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Jersey 10", sans-serif;
      font-weight: 400;
    }

    .logo {
      width: 180px;
      margin-bottom: 18px;
      image-rendering: pixelated;
    }

    .title {
      color: #FFD400;
      font-size: 64px;
      text-align: center;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #ffffff;
      font-size: 20px;
      margin-top: 10px;
      text-align: center;
      opacity: 0.9;
    }

    .button {
      margin-top: 25px;
      background: #00d5ff;
      color: #000;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 20px;
      text-decoration: none;
      user-select: none;
      transition: transform 0.1s ease;
      display: inline-block;
    }

    .button:hover {
      transform: scale(1.03);
    }

    .button:active {
      transform: scale(0.97);
    }

    .release {
      margin-top: 14px;
      color: white;
      opacity: 0.8;
      font-size: 18px;
    }

    .download {
      background: #ffffff;
      color: #000;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .apple-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="BulletBox Logo" class="logo">

  <div class="title">BULLETBOX</div>
  <div class="subtitle">The best 2d pvp game you'll ever play</div>

  <a class="button" href="https://discord.gg/cSffQ6bNf6" target="_blank">
    Join the Discord
  </a>

</html>
